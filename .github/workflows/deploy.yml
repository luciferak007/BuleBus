name: Deploy to Tomcat

on:
  push:
    branches: [ main ]
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven' # Speeds up future builds
    
    - name: Build WAR with Maven
      run: mvn clean package -DskipTests
    
    - name: Deploy to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        # FIX: 'strip_components' prevents creating 'BusReservationSystem/target/' folders on the server
        source: "target/*.war" 
        target: "/opt/tomcat/webapps/"
        strip_components: 1 

    - name: Restart Tomcat
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # Use sudo if your tomcat user requires it
          sudo /opt/tomcat/bin/shutdown.sh || true
          sleep 2
          # Optional: Clean up the old extracted folder to force a fresh redeploy
          sudo rm -rf /opt/tomcat/webapps/BusReservationSystem/ 
          sudo /opt/tomcat/bin/startup.sh

    - name: Build WAR with Maven
      run: |
        cd BusReservationSystem
        # The -U flag forces Maven to re-check the internet for missing jars
        mvn clean package -DskipTests -U 

