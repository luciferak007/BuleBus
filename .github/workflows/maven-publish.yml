name: Maven Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build WAR
        # This builds the project inside the subdirectory
        run: |
          cd BusReservationSystem
          mvn clean package -DskipTests

      - name: Copy WAR to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Pointing exactly to where the WAR is generated
          source: "BusReservationSystem/target/*.war"
          target: "/opt/tomcat/webapps/"
          # strip_components: 2 removes 'BusReservationSystem/target/' from the destination path
          strip_components: 2

      - name: Restart Tomcat
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo /opt/tomcat/bin/shutdown.sh || true
            sleep 3
            # Optional: remove old folder to ensure a clean redeploy
            sudo rm -rf /opt/tomcat/webapps/BusReservationSystem/
            sudo /opt/tomcat/bin/startup.sh
