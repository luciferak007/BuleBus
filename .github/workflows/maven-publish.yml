# Maven Publish Workflow for BusReservationSystem

name: Maven Publish

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup JDK
        uses: actions/setup-java@v1
        with:
          java-version: '11'  # Specify the version of JDK your project needs

      - name: Build WAR
        run: |
          cd BusReservationSystem
          mvn clean package

      - name: Deploy WAR
        run: |
          echo 'Deploying the WAR file...'
          # Add your deployment script/command here, such as: 
          # scp target/your-app.war user@server:/path/to/deploy
